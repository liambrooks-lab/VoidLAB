version: '3.8'

services:
  # --- FRONTEND (Next.js) ---
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/.next
    environment:
      - NODE_ENV=development
    depends_on:
      - api

  # --- BACKEND (Node.js API) ---
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000

# --- SHARED NETWORK ---
networks:
  default:
    name: voidlab-network