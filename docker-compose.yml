version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=voidlab
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - voidlab-postgres:/var/lib/postgresql/data

  # --- FRONTEND (Next.js) ---
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - api

  # --- BACKEND (Node.js API) ---
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/voidlab
      - DATABASE_SSL=false
      - WEB_APP_URL=http://localhost:3000
      - API_BASE_URL=http://localhost:5000
      - JWT_SECRET=voidlab-dev-jwt-secret
      - APP_ENCRYPTION_KEY=voidlab-dev-encryption-secret
      - JUDGE0_API_URL=https://ce.judge0.com
    depends_on:
      - postgres

# --- SHARED NETWORK ---
networks:
  default:
    name: voidlab-network

volumes:
  voidlab-postgres:
